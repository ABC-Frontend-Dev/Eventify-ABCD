name: Remote Deploy to AWS EC2

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Executing remote ssh commands using ssh-key
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: admin
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  script: |
                      cd /home/admin/Eventify-ABCD
                      git pull origin main
                      npm install
                      npm run build
                      # Force Next.js to bind to the server's network ports
                      pm2 delete eventify || true
                      pm2 start npm --name "eventify" --env PORT=3000 --env HOSTNAME=0.0.0.0 -- start
                      pm2 save
